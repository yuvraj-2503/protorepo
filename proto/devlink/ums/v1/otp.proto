syntax = "proto3";

package devlink.ums.v1;

option go_package = "github.com/devlink/gen/go/devlink/ums/v1";

message SendOTPRequest {
  string country_code = 1;
  string number = 2;
}

message SendOTPResponse {
  string session_id = 1;
}

service OTPService {
  rpc SendOTP(SendOTPRequest) returns (SendOTPResponse);
}
